 server:
  port: 8084
 spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/notificationdb
    username: postgres
    password: postgres

  jpa:
    show-sql: true

    hibernate:
      ddl-auto: update

  data:
    redis:
      host: localhost
      port: 6379

  mail:
    host: localhost
    port: 1025

  springdoc:
    swagger-ui:
      path: /swagger

  management:
    endpoints:
      web:
        exposure:
          include: "*"

  endpoint:
    health:
      show-details: always

  prometheus:
    metrics:
      export:
        enabled: true
