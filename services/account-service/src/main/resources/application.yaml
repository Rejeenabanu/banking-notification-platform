spring:
  application:
    name: account-service
  datasource:
    url: jdbc:postgresql://localhost:5432/accountdb
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true
server:
  port: 8082

springdoc:
  swagger-ui:
    path: /swagger

management:

  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

  Prometheus:
    metrics:
      export:
        enabled: true